name: publish-rust

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  detect-rust-release:
    name: Detect Rust crate publish need
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'ricofritzsche' }}
    outputs:
      should_publish_any: ${{ steps.plan.outputs.should_publish_any }}
      should_auth_with_trusted_publishing_any: ${{ steps.plan.outputs.should_auth_with_trusted_publishing_any }}
      factstr_should_publish: ${{ steps.plan.outputs.factstr_should_publish }}
      factstr_memory_should_publish: ${{ steps.plan.outputs.factstr_memory_should_publish }}
      factstr_sqlite_should_publish: ${{ steps.plan.outputs.factstr_sqlite_should_publish }}
      factstr_postgres_should_publish: ${{ steps.plan.outputs.factstr_postgres_should_publish }}
      factstr_version: ${{ steps.plan.outputs.factstr_version }}
      factstr_has_published_release: ${{ steps.plan.outputs.factstr_has_published_release }}
      factstr_memory_version: ${{ steps.plan.outputs.factstr_memory_version }}
      factstr_memory_has_published_release: ${{ steps.plan.outputs.factstr_memory_has_published_release }}
      factstr_sqlite_version: ${{ steps.plan.outputs.factstr_sqlite_version }}
      factstr_sqlite_has_published_release: ${{ steps.plan.outputs.factstr_sqlite_has_published_release }}
      factstr_postgres_version: ${{ steps.plan.outputs.factstr_postgres_version }}
      factstr_postgres_has_published_release: ${{ steps.plan.outputs.factstr_postgres_has_published_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build crates.io publish plan
        id: plan
        run: node scripts/check-rust-publish-plan.mjs

  publish-rust:
    name: Publish Rust crates
    needs: detect-rust-release
    if: ${{ github.repository_owner == 'ricofritzsche' && needs.detect-rust-release.outputs.should_publish_any == 'true' }}
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Trusted publishing only works after the crate has already had an initial
      # crates.io release with trusted publishing configured. Before that, set
      # CARGO_REGISTRY_TOKEN in the release environment for bootstrap publishes.
      - name: Use bootstrap token when configured
        id: bootstrap
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN_VALUE: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN_VALUE" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io trusted publishing
        id: auth
        if: ${{ needs.detect-rust-release.outputs.should_auth_with_trusted_publishing_any == 'true' }}
        uses: rust-lang/crates-io-auth-action@v1

      - name: Require bootstrap token for first crate publishes
        if: ${{ steps.bootstrap.outputs.has_token != 'true' && ((needs.detect-rust-release.outputs.factstr_should_publish == 'true' && needs.detect-rust-release.outputs.factstr_has_published_release != 'true') || (needs.detect-rust-release.outputs.factstr_memory_should_publish == 'true' && needs.detect-rust-release.outputs.factstr_memory_has_published_release != 'true') || (needs.detect-rust-release.outputs.factstr_sqlite_should_publish == 'true' && needs.detect-rust-release.outputs.factstr_sqlite_has_published_release != 'true') || (needs.detect-rust-release.outputs.factstr_postgres_should_publish == 'true' && needs.detect-rust-release.outputs.factstr_postgres_has_published_release != 'true')) }}
        run: |
          echo "A first publish is required for at least one Rust crate, but CARGO_REGISTRY_TOKEN is not configured in the release environment." >&2
          echo "Trusted publishing only works after the crate has already been published and configured on crates.io." >&2
          exit 1

      - name: Package factstr
        if: ${{ needs.detect-rust-release.outputs.factstr_should_publish == 'true' }}
        run: cargo package -p factstr

      - name: Publish factstr
        if: ${{ needs.detect-rust-release.outputs.factstr_should_publish == 'true' }}
        run: cargo publish -p factstr --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ needs.detect-rust-release.outputs.factstr_has_published_release == 'true' && steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for factstr on crates.io before store crate packaging
        if: ${{ needs.detect-rust-release.outputs.factstr_should_publish == 'true' && (needs.detect-rust-release.outputs.factstr_memory_should_publish == 'true' || needs.detect-rust-release.outputs.factstr_sqlite_should_publish == 'true' || needs.detect-rust-release.outputs.factstr_postgres_should_publish == 'true') }}
        run: node scripts/wait-for-crates-io-version.mjs factstr ${{ needs.detect-rust-release.outputs.factstr_version }}

      - name: Package factstr-memory
        if: ${{ needs.detect-rust-release.outputs.factstr_memory_should_publish == 'true' }}
        run: cargo package -p factstr-memory

      - name: Publish factstr-memory
        if: ${{ needs.detect-rust-release.outputs.factstr_memory_should_publish == 'true' }}
        run: cargo publish -p factstr-memory --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ needs.detect-rust-release.outputs.factstr_memory_has_published_release == 'true' && steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}

      - name: Package factstr-sqlite
        if: ${{ needs.detect-rust-release.outputs.factstr_sqlite_should_publish == 'true' }}
        run: cargo package -p factstr-sqlite

      - name: Publish factstr-sqlite
        if: ${{ needs.detect-rust-release.outputs.factstr_sqlite_should_publish == 'true' }}
        run: cargo publish -p factstr-sqlite --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ needs.detect-rust-release.outputs.factstr_sqlite_has_published_release == 'true' && steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}

      - name: Package factstr-postgres
        if: ${{ needs.detect-rust-release.outputs.factstr_postgres_should_publish == 'true' }}
        run: cargo package -p factstr-postgres

      - name: Publish factstr-postgres
        if: ${{ needs.detect-rust-release.outputs.factstr_postgres_should_publish == 'true' }}
        run: cargo publish -p factstr-postgres --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ needs.detect-rust-release.outputs.factstr_postgres_has_published_release == 'true' && steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
