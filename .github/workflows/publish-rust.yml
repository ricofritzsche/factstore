name: publish-rust

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  detect-rust-release:
    name: Detect Rust crate publish need
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'ricofritzsche' }}
    outputs:
      should_publish_any: ${{ steps.plan.outputs.should_publish_any }}
      factstr_should_publish: ${{ steps.plan.outputs.factstr_should_publish }}
      factstr_memory_should_publish: ${{ steps.plan.outputs.factstr_memory_should_publish }}
      factstr_sqlite_should_publish: ${{ steps.plan.outputs.factstr_sqlite_should_publish }}
      factstr_postgres_should_publish: ${{ steps.plan.outputs.factstr_postgres_should_publish }}
      factstr_version: ${{ steps.plan.outputs.factstr_version }}
      factstr_memory_version: ${{ steps.plan.outputs.factstr_memory_version }}
      factstr_sqlite_version: ${{ steps.plan.outputs.factstr_sqlite_version }}
      factstr_postgres_version: ${{ steps.plan.outputs.factstr_postgres_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build crates.io publish plan
        id: plan
        run: node scripts/check-rust-publish-plan.mjs

  publish-rust:
    name: Publish Rust crates
    needs: detect-rust-release
    if: ${{ github.repository_owner == 'ricofritzsche' && needs.detect-rust-release.outputs.should_publish_any == 'true' }}
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io trusted publishing
        id: auth
        # All publishable Rust crates use crates.io Trusted Publishing.
        # Each crate must have this GitHub repository configured as a trusted
        # publisher on crates.io for the publish step to succeed.
        uses: rust-lang/crates-io-auth-action@v1

      - name: Package factstr
        if: ${{ needs.detect-rust-release.outputs.factstr_should_publish == 'true' }}
        run: cargo package -p factstr

      - name: Publish factstr
        if: ${{ needs.detect-rust-release.outputs.factstr_should_publish == 'true' }}
        run: cargo publish -p factstr --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for factstr on crates.io before store crate packaging
        if: ${{ needs.detect-rust-release.outputs.factstr_should_publish == 'true' && (needs.detect-rust-release.outputs.factstr_memory_should_publish == 'true' || needs.detect-rust-release.outputs.factstr_sqlite_should_publish == 'true' || needs.detect-rust-release.outputs.factstr_postgres_should_publish == 'true') }}
        run: node scripts/wait-for-crates-io-version.mjs factstr ${{ needs.detect-rust-release.outputs.factstr_version }}

      - name: Package factstr-memory
        if: ${{ needs.detect-rust-release.outputs.factstr_memory_should_publish == 'true' }}
        run: cargo package -p factstr-memory

      - name: Publish factstr-memory
        if: ${{ needs.detect-rust-release.outputs.factstr_memory_should_publish == 'true' }}
        run: cargo publish -p factstr-memory --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Package factstr-sqlite
        if: ${{ needs.detect-rust-release.outputs.factstr_sqlite_should_publish == 'true' }}
        run: cargo package -p factstr-sqlite

      - name: Publish factstr-sqlite
        if: ${{ needs.detect-rust-release.outputs.factstr_sqlite_should_publish == 'true' }}
        run: cargo publish -p factstr-sqlite --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Package factstr-postgres
        if: ${{ needs.detect-rust-release.outputs.factstr_postgres_should_publish == 'true' }}
        run: cargo package -p factstr-postgres

      - name: Publish factstr-postgres
        if: ${{ needs.detect-rust-release.outputs.factstr_postgres_should_publish == 'true' }}
        run: cargo publish -p factstr-postgres --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-factstr-github-release:
    name: Tag and publish GitHub Release for factstr
    needs:
      - detect-rust-release
      - publish-rust
    if: ${{ github.repository_owner == 'ricofritzsche' && needs.detect-rust-release.outputs.factstr_should_publish == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve factstr release tag
        id: tag
        shell: bash
        run: |
          echo "value=v${{ needs.detect-rust-release.outputs.factstr_version }}" >> "$GITHUB_OUTPUT"

      - name: Create or update release tag on main
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          if git rev-parse "$RELEASE_TAG^{tag}" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists"
          else
            git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --latest \
              --verify-tag
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --latest
          fi
